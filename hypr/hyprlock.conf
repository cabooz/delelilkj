general {
    ignore_empty_input = true
    hide_cursor = true
    no_fade_in = false
}

# Arka Plan: Koyu, atmosferik gri (Senin inactive_border rengine yakın)
background {
    monitor =
    color = rgba(20, 20, 20, 1.0)
    blur_passes = 2 # Arka planı biraz buzla
    blur_size = 5
}

# SAAT: Half-Life HUD Yeşili
label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    color = rgba(44ff44ee)
    font_size = 90
    font_family = JetBrains Mono Nerd Font
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 2   # Hafif bir neon parlaması efekti
    shadow_size = 3
    shadow_color = rgb(0,0,0)
}

# TARİH: Turuncu HEV Rengi
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(ff9d00ee)
    font_size = 25
    font_family = JetBrains Mono Nerd Font
    position = 0, 50
    halign = center
    valign = center
}

# ŞİFRE KUTUSU: Senin verdiğin Gradient Rengi
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    
    # İç kısım koyu (Black Mesa grisi)
    inner_color = rgba(2b2b2baa)

    # ÇERÇEVE: Turuncu -> Yeşil geçişi (Senin Hyprland border ayarınla aynı)
    outer_color = rgba(ff9d00ee) rgba(44ff44ee) 45deg
    
    # Şifre kontrol edilirken dönen renkler
    check_color = rgba(44ff44ee) rgba(ff9d00ee) 120deg
    
    # Hata durumunda kırmızımsı turuncu
    fail_color = rgba(ff2222ee) rgba(ff9d00ee) 40deg

    # Yazılan şifre noktalarının rengi (HUD Yeşili)
    font_color = rgb(44ff44)
    
    fade_on_empty = false
    placeholder_text = <span foreground="##ff9d00">HEV...</span>
    
    rounding = 10
    
    position = 0, -50
    halign = center
    valign = center
}

# Alt tarafa küçük bir Gordon Freeman / Half-Life etiketi (Opsiyonel)
label {
    monitor =
    text = SUBJECT: $USER
    color = rgba(ff9d00ee)
    font_size = 12
    font_family = JetBrains Mono Nerd Font
    position = 0, 10
    halign = center
    valign = bottom
}
