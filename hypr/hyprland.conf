autogenerated = 0

# ─── MERKEZİ RENK PALETİ ────────────────────────────────────────
# Tüm renk değişkenleri buradan gelir. Renk değiştirmek için
# sadece hypr/colors.conf dosyasını düzenle.
source = ~/.config/hypr/colors.conf

# ─── ÇEKIRDEK AYARLAR ───────────────────────────────────────────
source = ~/.config/hypr/rocks/core/00_environment.conf
source = ~/.config/hypr/rocks/core/01_execonce.conf
source = ~/.config/hypr/rocks/core/02_windowrules.conf
source = ~/.config/hypr/rocks/core/03_layerrules.conf
source = ~/.config/hypr/rocks/core/04_keybindings.conf

# ─── PENCERE KENARLIKLARı ───────────────────────────────────────
# colors.conf'tan beslenir — oradan değiştir.
general {
    col.active_border   = $border_active
    col.inactive_border = $border_inactive
}
