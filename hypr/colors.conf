# ════════════════════════════════════════════════════════════════
#  MERKEZİ RENK PALETİ — Void Terminal (Fosfor Teal)
#  Tüm sistem bu dosyadan beslenir: Hyprland, Kitty, Dunst, Fuzzel
#  Değiştirmek istediğin rengi burada değiştir; her şey güncellenir.
# ════════════════════════════════════════════════════════════════

# ─── Arka Plan ──────────────────────────────────────────────────
$bg            = 0xff030810   # Koyu void siyah-mavi
$bg_alt        = 0xff060f1c   # Biraz daha açık arka plan
$bg_panel      = 0xff050d18   # Panel arka planı

# ─── Ön Plan (Metin) ────────────────────────────────────────────
$fg            = 0xffb0d8d0   # Ana metin — soluk teal-beyaz
$fg_dim        = 0xff6a9a94   # İkincil metin
$fg_muted      = 0xff2a4a48   # Soluk metin

# ─── Vurgu Rengi (Accent) ───────────────────────────────────────
$accent        = 0xff00e5b8   # Fosfor teal — ana vurgu
$accent_light  = 0xff22ffdd   # Açık teal
$accent_dark   = 0xff00b890   # Koyu teal

# ─── Kenarlıklar ────────────────────────────────────────────────
$border_active   = 0xff00e5b8   # Aktif pencere kenarlığı
$border_inactive = 0xff142840   # Pasif pencere kenarlığı

# ─── Uyarı / Tehlike ────────────────────────────────────────────
$urgent        = 0xff0077aa   # Acil bildirim rengi
$warning       = 0xff004a6a   # Uyarı rengi
