
# ── Quickshell layer: blur + transparency ──────────────────────────────
# "quickshell" is the Wayland layer namespace used by the Quickshell compositor.
# blur          → apply Hyprland's Gaussian blur BEHIND the panel surfaces
# ignorealpha   → pixels with alpha < 0.15 get full blur (no hard edge)
# noanim        → prevent fade-in/out double-compositing artefacts on panels
# layerrule = blur,quickshell
# layerrule = ignorealpha 0.15,quickshell
# layerrule = noanim,quickshell
