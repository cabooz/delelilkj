$terminal = kitty
$fileManager = dolphin
$menu = fuzzel
$mainMod = SUPER 
$gridScript = ~/.config/hypr/rocks/scripts/grid.sh

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, 
bind = $mainMod, D, exec, $menu
bind = $mainMod, Z, exec, zen-browser
bind = $mainMod, M, exec, code
bind = $mainMod, N, exec, neovide

# Overview - Ravenholm 3x3 Grid (Super + Tab)
bind = $mainMod, Tab, global, quickshell:toggleOverview

# Focus navigation (arrow keys)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
#---------------------------------------------------------------------------
# Grid Navigation (3×3)
# ┌───┬───┬───┐
# │ 1 │ 2 │ 3 │  ← k ile yukarı
# ├───┼───┼───┤
# │ 4 │ 5 │ 6 │  ← h/l ile sağ-sol
# ├───┼───┼───┤
# │ 7 │ 8 │ 9 │  ← j ile aşağı
# └───┴───┴───┘
#---------------------------------------------------------------------------

# Grid workspace navigasyonu (Super + hjkl)
bind = $mainMod, h, exec, $gridScript move -1 0
bind = $mainMod, l, exec, $gridScript move 1 0
bind = $mainMod, k, exec, $gridScript move 0 -1
bind = $mainMod, j, exec, $gridScript move 0 1

# Pencere fırlatma ve takip (Super + Shift + hjkl)
bind = $mainMod SHIFT, h, exec, $gridScript throw -1 0
bind = $mainMod SHIFT, l, exec, $gridScript throw 1 0
bind = $mainMod SHIFT, k, exec, $gridScript throw 0 -1
bind = $mainMod SHIFT, j, exec, $gridScript throw 0 1

# Pencere fırlatma (takip etmeden) (Super + Ctrl + hjkl)
bind = $mainMod CTRL, h, exec, $gridScript send -1 0
bind = $mainMod CTRL, l, exec, $gridScript send 1 0
bind = $mainMod CTRL, k, exec, $gridScript send 0 -1
bind = $mainMod CTRL, j, exec, $gridScript send 0 1

#---------------------------------------------------------------------------
# Direct Virtual Desktop Access (1-9 + Numpad)
# vdesk dispatcher kullanır (hyprland-virtual-desktops plugin)
#---------------------------------------------------------------------------

# Normal tuşlar
bind = $mainMod, 1, exec, hyprctl dispatch vdesk 1
bind = $mainMod, 2, exec, hyprctl dispatch vdesk 2
bind = $mainMod, 3, exec, hyprctl dispatch vdesk 3
bind = $mainMod, 4, exec, hyprctl dispatch vdesk 4
bind = $mainMod, 5, exec, hyprctl dispatch vdesk 5
bind = $mainMod, 6, exec, hyprctl dispatch vdesk 6
bind = $mainMod, 7, exec, hyprctl dispatch vdesk 7
bind = $mainMod, 8, exec, hyprctl dispatch vdesk 8
bind = $mainMod, 9, exec, hyprctl dispatch vdesk 9

# Numpad
bind = $mainMod, KP_End, exec, hyprctl dispatch vdesk 1
bind = $mainMod, KP_Down, exec, hyprctl dispatch vdesk 2
bind = $mainMod, KP_Next, exec, hyprctl dispatch vdesk 3
bind = $mainMod, KP_Left, exec, hyprctl dispatch vdesk 4
bind = $mainMod, KP_Begin, exec, hyprctl dispatch vdesk 5
bind = $mainMod, KP_Right, exec, hyprctl dispatch vdesk 6
bind = $mainMod, KP_Home, exec, hyprctl dispatch vdesk 7
bind = $mainMod, KP_Up, exec, hyprctl dispatch vdesk 8
bind = $mainMod, KP_Prior, exec, hyprctl dispatch vdesk 9

# Pencere taşıma (normal tuşlar)
bind = $mainMod SHIFT, 1, exec, hyprctl dispatch movetodesk 1
bind = $mainMod SHIFT, 2, exec, hyprctl dispatch movetodesk 2
bind = $mainMod SHIFT, 3, exec, hyprctl dispatch movetodesk 3
bind = $mainMod SHIFT, 4, exec, hyprctl dispatch movetodesk 4
bind = $mainMod SHIFT, 5, exec, hyprctl dispatch movetodesk 5
bind = $mainMod SHIFT, 6, exec, hyprctl dispatch movetodesk 6
bind = $mainMod SHIFT, 7, exec, hyprctl dispatch movetodesk 7
bind = $mainMod SHIFT, 8, exec, hyprctl dispatch movetodesk 8
bind = $mainMod SHIFT, 9, exec, hyprctl dispatch movetodesk 9

# Pencere taşıma - sessiz/takipsiz (focus gitmez)
bind = $mainMod CTRL, 1, exec, hyprctl dispatch movetodesksilent 1
bind = $mainMod CTRL, 2, exec, hyprctl dispatch movetodesksilent 2
bind = $mainMod CTRL, 3, exec, hyprctl dispatch movetodesksilent 3
bind = $mainMod CTRL, 4, exec, hyprctl dispatch movetodesksilent 4
bind = $mainMod CTRL, 5, exec, hyprctl dispatch movetodesksilent 5
bind = $mainMod CTRL, 6, exec, hyprctl dispatch movetodesksilent 6
bind = $mainMod CTRL, 7, exec, hyprctl dispatch movetodesksilent 7
bind = $mainMod CTRL, 8, exec, hyprctl dispatch movetodesksilent 8
bind = $mainMod CTRL, 9, exec, hyprctl dispatch movetodesksilent 9

# Pencere taşıma (numpad)
bind = $mainMod SHIFT, KP_End, exec, hyprctl dispatch movetodesk 1
bind = $mainMod SHIFT, KP_Down, exec, hyprctl dispatch movetodesk 2
bind = $mainMod SHIFT, KP_Next, exec, hyprctl dispatch movetodesk 3
bind = $mainMod SHIFT, KP_Left, exec, hyprctl dispatch movetodesk 4
bind = $mainMod SHIFT, KP_Begin, exec, hyprctl dispatch movetodesk 5
bind = $mainMod SHIFT, KP_Right, exec, hyprctl dispatch movetodesk 6
bind = $mainMod SHIFT, KP_Home, exec, hyprctl dispatch movetodesk 7
bind = $mainMod SHIFT, KP_Up, exec, hyprctl dispatch movetodesk 8
bind = $mainMod SHIFT, KP_Prior, exec, hyprctl dispatch movetodesk 9

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, A, togglespecialworkspace, dashboard
bind = $mainMod SHIFT, A, movetoworkspace, special:dashboard
#
# bind = $mainMod, mouse_down, exec, hyprctl dispatch nextdesk
# bind = $mainMod, mouse_up, exec, hyprctl dispatch prevdesk
#
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bindr = $mainMod, F, exec, /home/rakman/.config/hypr/rocks/scripts/fuzzel_cliphist.sh
bindr = $mainMod, D, exec, /home/rakman/.config/hypr/rocks/scripts/fuzzel_applauncher.sh

bind = $mainMod, Page_Down, exec, ~/.config/hypr/rocks/scripts/grimblast-counter.sh output
bind = $mainMod, End, exec, ~/.config/hypr/rocks/scripts/grimblast-counter.sh area

bind = , F1, exec, ~/.config/hypr/rocks/scripts/smart_brightness.sh down
bind = , F2, exec, ~/.config/hypr/rocks/scripts/smart_brightness.sh up


input {
    kb_layout = tr
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

		follow_mouse = 1

    sensitivity = 0 

    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

