#---------------------------------------------------------------------------
# Virtual Desktops Plugin Configuration
# 3×3 virtual desktop grid (9 vdesks)
# https://github.com/levnikmyskin/hyprland-virtual-desktops
#---------------------------------------------------------------------------

plugin {
    virtual-desktops {
        # ══════════════════════════════════════════════════════════════════
        # STRICT 1-9 BOUNDARY ENFORCEMENT
        # ══════════════════════════════════════════════════════════════════
        # Explicit names mapping ensures getOrCreateVdesk() only recognizes 1-9
        # Source: VirtualDeskManager::getDeskIdFromName() checks vdeskNamesMap
        names = 1:Grid-1, 2:Grid-2, 3:Grid-3, 4:Grid-4, 5:Grid-5, 6:Grid-6, 7:Grid-7, 8:Grid-8, 9:Grid-9
        
        # cycleworkspaces = 1 enables workspace swapping on dual monitors
        # (Does NOT prevent ID 10 creation - that's handled by names map)
        cycleworkspaces = 1
        
        # Layout persistence across monitor changes
        rememberlayout = size
        
        # Suppress startup notification
        notifyinit = 0
        
        # Keep logging off for performance
        verbose_logging = 0
    }
}
