# ════════════════════════════════════════════════════════════════
#  SİSTEM ORTAM DEĞİŞKENLERİ VE ÇEKIRDEK AYARLAR
#  Tüm env= değişkenleri burada — dağınık değil, tek yerde.
# ════════════════════════════════════════════════════════════════

# ─── XWAYLAND ───────────────────────────────────────────────────
# X11 uygulamalarının Wayland üzerinde çalışması için
xwayland {
    force_zero_scaling = true
    create_abstract_socket = true
}

# ─── OPENGL / NVIDIA ────────────────────────────────────────────
opengl {
    nvidia_anti_flicker = true
}

# ─── PENCERE DÜZENİ (TILING) ────────────────────────────────────
dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

# ─── ÇEŞİTLİ AYARLAR ────────────────────────────────────────────
misc {
    force_default_wallpaper = -1
    disable_hyprland_logo   = true
    vfr                     = false
    vrr                     = 1
    animate_manual_resizes  = true
}

# ─── RENDER ─────────────────────────────────────────────────────
render {
    direct_scanout       = 1
    cm_enabled           = true
    cm_auto_hdr          = 1
    new_render_scheduling = true
    non_shader_cm        = 1
}

# ─── MONİTÖR TANIMLARI ──────────────────────────────────────────
# Sol monitör (HDMI) + Sağ monitör (dahili ekran)
monitor = HDMI-A-1, 1920x1080@100.00, 0x0,      1.00
monitor = eDP-1,    1920x1080@120.00, 1920x0,    1.00

# ─── NVIDIA / WAYLAND ORTAM DEĞİŞKENLERİ ───────────────────────
# NVIDIA ekran kartı için gerekli Wayland sürücü ayarları
env = LIBVA_DRIVER_NAME,    nvidia
env = GBM_BACKEND,          nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
env = NVD_BACKEND,          direct

# ─── WAYLAND MASAÜSTÜ ORTAMI ────────────────────────────────────
env = XDG_SESSION_TYPE,     wayland
env = XDG_CURRENT_DESKTOP,  Hyprland
env = XDG_SESSION_DESKTOP,  Hyprland

# ─── GTK / QT WAYLAND UYUMU ─────────────────────────────────────
env = GDK_BACKEND,          wayland,x11,*
env = QT_QPA_PLATFORM,      wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 0
env = QT_QPA_PLATFORMTHEME, kde

# ─── ELECTRON / MOZILLA ─────────────────────────────────────────
env = ELECTRON_OZONE_PLATFORM_HINT, auto
env = MOZ_ENABLE_WAYLAND,   1
env = GTL_THEME,nwg-look
# ─── İMLEÇ ──────────────────────────────────────────────────────
env = HYPRCURSOR_THEME,     Bibata-Modern-Amber
env = HYPRCURSOR_SIZE,      24
env = XCURSOR_THEME,        Bibata-Modern-Amber
env = XCURSOR_SIZE,         24

