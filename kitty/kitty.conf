# ════════════════════════════════════════════════════════════════
#  KİTTY TERMINAL AYARLARI
#  Void Terminal teması — Gruvbox renk paleti
#  Renk değişiklikleri için bu dosyadaki renk bölümünü düzenle.
# ════════════════════════════════════════════════════════════════

# ─── YAZI TİPİ ──────────────────────────────────────────────────
font_family      JetbrainsMonoNL Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13

# ─── PENCERE ────────────────────────────────────────────────────
window_padding_width 24
background_opacity   80.0

# ─── SEKME ÇUBUĞU ───────────────────────────────────────────────
tab_bar_edge     top
tab_bar_style    powerline
tab_powerline_style round

# ─── KOPYALAMA / KONTROL ────────────────────────────────────────
copy_on_select          yes
allow_remote_control    yes
strip_trailing_spaces   smart

# ════════════════════════════════════════════════════════════════
#  RENKLER — Gruvbox Dark
#  Tüm terminal renkleri burada; Hyprland renkleriyle koordineli.
# ════════════════════════════════════════════════════════════════

# Arka plan ve ön plan
foreground              #ebdbb2
background              #000000
selection_foreground    #928374
selection_background    #ebdbb2

# İmleç
cursor                  #928374
cursor_text_color       background

# Bağlantı rengi
url_color               #83a598

# Görsel zil
visual_bell_color       #8ec07c
bell_border_color       #8ec07c

# Pencere kenarlıkları
active_border_color     #d3869b
inactive_border_color   #665c54

# Sekme renkleri
active_tab_foreground   #fbf1c7
active_tab_background   #665c54
active_tab_font_style   bold
inactive_tab_foreground #a89984
inactive_tab_background #3c3836
inactive_tab_font_style normal

# ─── 16 RENKLİ PALET (Terminal renkleri) ────────────────────────

# Siyah (bg3/bg4)
color0                  #665c54
color8                  #7c6f64

# Kırmızı
color1                  #cc241d
color9                  #fb4934

# Yeşil
color2                  #98971a
color10                 #b8bb26

# Sarı
color3                  #d79921
color11                 #fabd2f

# Mavi
color4                  #458588
color12                 #83a598

# Mor
color5                  #b16286
color13                 #d3869b

# Deniz mavisi (aqua)
color6                  #689d6a
color14                 #8ec07c

# Beyaz (fg4/fg3)
color7                  #a89984
color15                 #bdae93
