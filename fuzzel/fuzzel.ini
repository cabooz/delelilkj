# ════════════════════════════════════════════════════════════════
#  FUZZEL — UYGULAMA BAŞLATICI AYARLARI
#  Void Terminal teması — fosfor teal renk paleti
# ════════════════════════════════════════════════════════════════

# ─── GENEL AYARLAR ──────────────────────────────────────────────
font            = JetBrains Mono:size=11
terminal        = kitty
prompt          = "◈ "
layer           = overlay
width           = 35
horizontal-pad  = 24
vertical-pad    = 18
inner-pad       = 8

# ─── RENKLER (colors.conf ile uyumlu palette) ───────────────────
[colors]
# Arka plan     — koyu void mavi  (#030810 + e6=90% opak)
background      = 030810e6
# Metin         — soluk teal-beyaz (#b0d8d0)
text            = b0d8d0ff
# Eşleşme       — fosfor teal vurgu (#00e5b8)
match           = 00e5b8ff
# Seçili satır  — koyu hücre mavi
selection       = 0a1628ff
# Seçili metin  — fosfor teal
selection-text  = 00e5b8ff
# Seçili eşleşme — parlak teal
selection-match = 22ffddff
# Kenarlık      — fosfor teal (border_active)
border          = 00e5b8ff

# ─── KENARLIK AYARLARI ──────────────────────────────────────────
[border]
width  = 2
radius = 8

# ─── DMENU MODU ─────────────────────────────────────────────────
[dmenu]
mode                    = text
exit-immediately-if-empty = yes
